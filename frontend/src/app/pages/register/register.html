<div class="auth-wrap">
  <form class="card" (ngSubmit)="submit()">
    <h1>Kayıt Ol</h1>
    <p class="sub">Yeni bir SmartOrder hesabı oluştur</p>

    @if (error()) {
      <div class="error">{{ error() }}</div>
    }

    <div class="field">
      <label for="username">Kullanıcı adı</label>
      <input id="username" name="username" [(ngModel)]="username" required />
    </div>

    <div class="field">
      <label for="email">E-posta</label>
      <input id="email" name="email" type="email" [(ngModel)]="email" required />
    </div>

    <div class="field">
      <label for="firstName">Ad</label>
      <input id="firstName" name="firstName" [(ngModel)]="firstName" />
    </div>

    <div class="field">
      <label for="lastName">Soyad</label>
      <input id="lastName" name="lastName" [(ngModel)]="lastName" />
    </div>

    <div class="field">
      <label for="password">Şifre</label>
      <input id="password" name="password" type="password" [(ngModel)]="password" autocomplete="new-password" required />
    </div>

    <button class="primary" type="submit" [disabled]="loading()">
      {{ loading() ? 'Kaydediliyor…' : 'Kayıt Ol' }}
    </button>

    <div class="switch">
      Zaten hesabın var mı? <a routerLink="/login">Giriş yap</a>
    </div>
  </form>
</div>
