spring:
  application:
    name: order-service
  datasource:
    url: jdbc:h2:mem:order;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  cloud:
    stream:
      bindings:
        orderCreatedEvent-out-0:
          destination: order-topic
          content-type: application/json
      kafka:
        binder:
          # Broker adresi runtime'da KafkaBrokerDiscoveryEnvironmentPostProcessor tarafından,
          # embedded-servers'ın http://localhost:8090/kafka/brokers endpoint'inden keşfedilip
          # set edilir (embedded broker portu sabitlenemediği için). Aşağıdaki yalnızca fallback.
          brokers: localhost:9094
        bindings:
          orderCreatedEvent-out-0:
            producer:
              sync: true # mesaj gönderim işleminin senkron olmasını sağlar. Kafka streambridge.send() ok-error verene kadar bekler.
server:
  port: 8081