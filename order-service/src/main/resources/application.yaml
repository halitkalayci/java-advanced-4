spring:
  application:
    name: order-service
  datasource:
    url: jdbc:h2:mem:order;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  cloud:
    stream:
      bindings:
        orderCreatedEvent-out-0:
          destination: order-topic
          content-type: application/json
      kafka:
        binder:
          brokers: 127.0.0.1:29023
        bindings:
          orderCreatedEvent-out-0:
            producer:
              sync: true # mesaj gönderim işleminin senkron olmasını sağlar. Kafka streambridge.send() ok-error verene kadar bekler.
server:
  port: 8081