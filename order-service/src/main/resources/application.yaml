spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8085/realms/smartorder
  application:
    name: order-service
  datasource:
    url: jdbc:h2:mem:order;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  cloud:
    stream:
      bindings:
        orderCreatedEvent-out-0:
          destination: order-topic
          content-type: application/json
      kafka:
        binder:
          brokers: localhost:9094
          required-acks: all
          configuration:
            enable.idempotence: true
            retries: 20
            delivery.timeout.ms: 10000
        bindings:
          orderCreatedEvent-out-0:
            producer:
              sync: true
server:
  port: 8081